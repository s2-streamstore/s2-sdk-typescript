<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resumable Chat: Powered by S2</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0a; color: #e5e5e5; height: 100vh; display: flex; flex-direction: column; }
    .header { padding: 12px 20px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .header img { height: 22px; filter: invert(1); }
    .header h1 { font-size: 15px; font-weight: 500; opacity: .7; }
    .header .chat-link { max-width: min(44vw, 360px); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; color: #a5b4fc; text-decoration: none; padding: 4px 10px; border-radius: 999px; border: 1px solid #312e81; background: #161329; }
    .header .chat-link:hover { background: #1d1840; }
    .header .copy-link { padding: 6px 12px; background: #171717; color: #d4d4d8; border: 1px solid #2a2a2a; font-size: 12px; }
    .header .copy-link:hover { background: #222; }
    .header .status { margin-left: auto; font-size: 12px; padding: 3px 10px; border-radius: 99px; }
    .status.idle { background: #1a1a2e; color: #818cf8; }
    .status.streaming { background: #14281e; color: #34d399; }
    .chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .msg { max-width: 680px; width: 100%; }
    .msg.user { align-self: flex-end; }
    .msg-label { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; opacity: .4; }
    .msg.user .msg-label { text-align: right; }
    .msg-body { padding: 10px 14px; border-radius: 10px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .msg.user .msg-body { background: #1e1b4b; color: #c7d2fe; border-bottom-right-radius: 2px; }
    .msg.assistant .msg-body { background: #1a1a1a; border: 1px solid #262626; border-bottom-left-radius: 2px; }
    .msg-body.streaming { border-color: #34d399; }
    .input-row { padding: 12px 20px; border-top: 1px solid #222; display: flex; gap: 8px; }
    input { flex: 1; padding: 10px 14px; background: #141414; border: 1px solid #333; border-radius: 8px; color: #e5e5e5; font-size: 14px; outline: none; }
    input:focus { border-color: #6366f1; }
    input:disabled { opacity: .4; }
    button { padding: 10px 20px; background: #6366f1; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
    button:hover { background: #4f46e5; }
    button:disabled { opacity: .4; cursor: default; }
    .info { text-align: center; padding: 40px 20px; opacity: .3; font-size: 13px; }
    .info kbd { background: #222; padding: 2px 6px; border-radius: 4px; font-family: inherit; }
    @media (max-width: 640px) {
      .header .status { margin-left: 0; }
      .header .chat-link { max-width: calc(100vw - 150px); }
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="https://raw.githubusercontent.com/s2-streamstore/s2-sdk-rust/main/assets/s2-white.png" alt="S2">
    <h1>Resumable Chat</h1>
    <a class="chat-link" id="chat-link" href="/" title="Share this chat URL"></a>
    <button class="copy-link" id="copy-link" type="button">Copy link</button>
    <span class="status idle" id="status">idle</span>
  </div>

  <div class="chat" id="chat">
    <div class="info">Send a message. Try <kbd>F5</kbd> mid-generation. The stream resumes from S2, completed messages reload from the transcript stream, and this URL stays pinned to the same chat.</div>
  </div>

  <div class="input-row">
    <input type="text" id="input" placeholder="Say something..." autocomplete="off" autofocus>
    <button id="send">Send</button>
  </div>

  <script type="module">
    import { EventSourceParserStream } from 'https://esm.sh/eventsource-parser@3/stream';

    const API = '/api/chat';
    const HISTORY_API = `${API}/history`;
    const EMPTY_STATE_HTML = '<div class="info">Send a message. Try <kbd>F5</kbd> mid-generation. The stream resumes from S2, completed messages reload from the transcript stream, and this URL will reopen the same chat.</div>';
    const CHAT_ID_PATTERN = /^[a-zA-Z0-9_-]{1,64}$/;

    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const statusEl = document.getElementById('status');
    const chatLinkEl = document.getElementById('chat-link');
    const copyLinkEl = document.getElementById('copy-link');

    let streaming = false;

    function isValidChatId(value) {
      return typeof value === 'string' && CHAT_ID_PATTERN.test(value);
    }

    function resolveChatId() {
      const url = new URL(window.location.href);
      const fromQuery = url.searchParams.get('chat');
      if (isValidChatId(fromQuery)) return fromQuery;

      const fromSession = sessionStorage.getItem('chatId');
      if (isValidChatId(fromSession)) return fromSession;

      return crypto.randomUUID();
    }

    const chatId = resolveChatId();
    sessionStorage.setItem('chatId', chatId);

    function chatUrl() {
      const url = new URL(window.location.href);
      url.searchParams.set('chat', chatId);
      return url;
    }

    function syncChatUrl() {
      const url = chatUrl();
      const relativeUrl = `${url.pathname}?${url.searchParams.toString()}`;
      window.history.replaceState(null, '', relativeUrl);
      chatLinkEl.href = relativeUrl;
      chatLinkEl.textContent = `chat=${chatId}`;
      chatLinkEl.title = url.toString();
    }

    function setStatus(status) {
      statusEl.textContent = status;
      statusEl.className = `status ${status}`;
    }

    function setInputEnabled(enabled) {
      inputEl.disabled = !enabled;
      sendBtn.disabled = !enabled;
    }

    function showEmptyState() {
      chatEl.innerHTML = EMPTY_STATE_HTML;
    }

    function clearEmptyState() {
      const info = chatEl.querySelector('.info');
      if (info) info.remove();
    }

    function addMessage(role, content, options = {}) {
      clearEmptyState();

      const wrap = document.createElement('div');
      wrap.className = `msg ${role}`;

      const label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = role;

      const body = document.createElement('div');
      body.className = `msg-body${options.streaming ? ' streaming' : ''}`;
      body.textContent = content;

      wrap.appendChild(label);
      wrap.appendChild(body);
      chatEl.appendChild(wrap);
      chatEl.scrollTop = chatEl.scrollHeight;
      return body;
    }

    async function copyChatUrl() {
      const url = chatUrl().toString();
      try {
        await navigator.clipboard.writeText(url);
        copyLinkEl.textContent = 'Copied';
        window.setTimeout(() => {
          copyLinkEl.textContent = 'Copy link';
        }, 1200);
      } catch {
        window.prompt('Copy chat URL', url);
      }
    }

    async function readSse(res, bubble) {
      const events = res.body
        .pipeThrough(new TextDecoderStream())
        .pipeThrough(new EventSourceParserStream());
      const reader = events.getReader();
      let fullText = '';
      let errorText = '';

      try {
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          if (!value || typeof value.data !== 'string') continue;
          if (value.data === '[DONE]') continue;

          let chunk;
          try {
            chunk = JSON.parse(value.data);
          } catch {
            continue;
          }

          if (chunk.type === 'text-delta' && chunk.delta) {
            fullText += chunk.delta;
            bubble.textContent = fullText;
            chatEl.scrollTop = chatEl.scrollHeight;
          }
          if (chunk.type === 'error' && chunk.errorText) {
            errorText = chunk.errorText;
          }
        }
      } finally {
        reader.releaseLock();
      }

      return { fullText, errorText };
    }

    async function loadHistory() {
      const res = await fetch(`${HISTORY_API}?id=${encodeURIComponent(chatId)}`);
      if (!res.ok) {
        showEmptyState();
        return;
      }

      const payload = await res.json();
      const history = Array.isArray(payload.messages) ? payload.messages : [];
      chatEl.innerHTML = '';

      if (history.length === 0) {
        showEmptyState();
        return;
      }

      for (const message of history) {
        addMessage(message.role, message.content);
      }
    }

    async function consumeSseInto(res) {
      const bubble = addMessage('assistant', '', { streaming: true });
      try {
        const { fullText, errorText } = await readSse(res, bubble);
        if (errorText) {
          bubble.textContent = fullText
            ? `${fullText}\n\n[error] ${errorText}`
            : `[error] ${errorText}`;
        }
        return bubble;
      } catch (error) {
        bubble.parentElement?.remove();
        throw error;
      }
    }

    async function reconnectToActiveStream() {
      const res = await fetch(`${API}/stream?id=${encodeURIComponent(chatId)}`);
      if (res.status === 204 || !res.ok) return null;
      return await consumeSseInto(res);
    }

    const initPromise = loadHistory().catch(() => {
      showEmptyState();
    });

    async function send() {
      await initPromise;
      const text = inputEl.value.trim();
      if (!text || streaming) return;

      inputEl.value = '';
      streaming = true;
      setInputEnabled(false);
      setStatus('streaming');
      addMessage('user', text);

      try {
        const userMessage = { role: 'user', content: text };
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: chatId, message: userMessage }),
        });

        if (!res.ok) return;

        const bubble = await consumeSseInto(res);
        if (bubble) bubble.classList.remove('streaming');
      } finally {
        streaming = false;
        setInputEnabled(true);
        setStatus('idle');
        inputEl.focus();
      }
    }

    async function tryReconnect() {
      await initPromise;

      try {
        setStatus('streaming');
        streaming = true;
        setInputEnabled(false);

        const bubble = await reconnectToActiveStream();
        if (bubble) bubble.classList.remove('streaming');
      } catch {
        // best-effort reconnect
      } finally {
        streaming = false;
        setInputEnabled(true);
        setStatus('idle');
      }
    }

    syncChatUrl();
    copyLinkEl.addEventListener('click', copyChatUrl);
    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        send();
      }
    });

    initPromise.then(() => tryReconnect());
  </script>
</body>
</html>
