<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resumable Chat — S2</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0a; color: #e5e5e5; height: 100vh; display: flex; flex-direction: column; }
    .header { padding: 12px 20px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 12px; }
    .header img { height: 22px; filter: invert(1); }
    .header h1 { font-size: 15px; font-weight: 500; opacity: .7; }
    .header .status { margin-left: auto; font-size: 12px; padding: 3px 10px; border-radius: 99px; }
    .status.idle { background: #1a1a2e; color: #818cf8; }
    .status.streaming { background: #14281e; color: #34d399; }
    .status.persisting { background: #2a1f0e; color: #fbbf24; }
    .chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .msg { max-width: 680px; width: 100%; }
    .msg.user { align-self: flex-end; }
    .msg-label { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; opacity: .4; }
    .msg.user .msg-label { text-align: right; }
    .msg-body { padding: 10px 14px; border-radius: 10px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .msg.user .msg-body { background: #1e1b4b; color: #c7d2fe; border-bottom-right-radius: 2px; }
    .msg.assistant .msg-body { background: #1a1a1a; border: 1px solid #262626; border-bottom-left-radius: 2px; }
    .msg-body.streaming { border-color: #34d399; }
    .input-row { padding: 12px 20px; border-top: 1px solid #222; display: flex; gap: 8px; }
    input { flex: 1; padding: 10px 14px; background: #141414; border: 1px solid #333; border-radius: 8px; color: #e5e5e5; font-size: 14px; outline: none; }
    input:focus { border-color: #6366f1; }
    input:disabled { opacity: .4; }
    button { padding: 10px 20px; background: #6366f1; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
    button:hover { background: #4f46e5; }
    button:disabled { opacity: .4; cursor: default; }
    .info { text-align: center; padding: 40px 20px; opacity: .3; font-size: 13px; }
    .info kbd { background: #222; padding: 2px 6px; border-radius: 4px; font-family: inherit; }
  </style>
</head>
<body>
  <div class="header">
    <img src="https://raw.githubusercontent.com/s2-streamstore/s2-sdk-rust/main/assets/s2-white.png" alt="S2">
    <h1>Resumable Chat</h1>
    <span class="status idle" id="status">idle</span>
  </div>

  <div class="chat" id="chat">
    <div class="info">Send a message. Try <kbd>F5</kbd> mid-generation — the stream resumes from S2.</div>
  </div>

  <div class="input-row">
    <input type="text" id="input" placeholder="Say something..." autocomplete="off" autofocus>
    <button id="send">Send</button>
  </div>

  <script>
    // ── Config ───────────────────────────────────────────────────────────────
    // Injected by the server at serve-time.
    const API        = '/api/chat';
    const S2_TOKEN   = '%%S2_TOKEN%%';
    const S2_BASIN   = '%%S2_BASIN%%';
    const S2_BASE    = '%%S2_BASE_URL%%'; // e.g. http://localhost:4000/v1 (lite) or https://mybas.b.s2.dev/v1 (cloud)

    // ── State ────────────────────────────────────────────────────────────────
    const chatEl  = document.getElementById('chat');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const statusEl = document.getElementById('status');

    // We generate a chat ID per tab and persist it in sessionStorage so
    // a refresh can attempt to reconnect.
    let chatId = sessionStorage.getItem('chatId');
    if (!chatId) {
      chatId = crypto.randomUUID();
      sessionStorage.setItem('chatId', chatId);
    }

    const messages = [];   // { role, content }
    let streaming = false;

    // ── UI helpers ───────────────────────────────────────────────────────────

    function setStatus(s) {
      statusEl.textContent = s;
      statusEl.className = 'status ' + s;
    }

    function addMessage(role, content, opts = {}) {
      const wrap = document.createElement('div');
      wrap.className = `msg ${role}`;

      const label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = role;

      const body = document.createElement('div');
      body.className = 'msg-body' + (opts.streaming ? ' streaming' : '');
      body.textContent = content;

      wrap.appendChild(label);
      wrap.appendChild(body);
      chatEl.appendChild(wrap);
      chatEl.scrollTop = chatEl.scrollHeight;
      return body;
    }

    function setInputEnabled(on) {
      inputEl.disabled = !on;
      sendBtn.disabled = !on;
    }

    // ── S2 SSE reader ────────────────────────────────────────────────────────
    // This is what createS2ChatTransport does under the hood.

    function s2ReadUrl(streamName) {
      const base = S2_BASE.replace(/\/$/, '');
      return `${base}/streams/${encodeURIComponent(streamName)}/records?seq_num=0`;
    }

    /**
     * Open an SSE connection to S2 and yield UIMessageChunk objects.
     * Returns a ReadableStream so we can cancel on abort.
     */
    function readFromS2(streamName, signal) {
      return new ReadableStream({
        async start(ctrl) {
          try {
            const res = await fetch(s2ReadUrl(streamName), {
              headers: {
                'Authorization': `Bearer ${S2_TOKEN}`,
                'Accept': 'text/event-stream',
                's2-basin': S2_BASIN,  // required for s2-lite, harmless for cloud
              },
              signal,
            });
            if (!res.ok) {
              console.error('[s2-sse] HTTP', res.status, res.statusText, await res.text().catch(() => ''));
              ctrl.close(); return;
            }
            console.log('[s2-sse] connected to', s2ReadUrl(streamName));

            const reader = res.body.getReader();
            const dec = new TextDecoder();
            let buf = '', event = '', data = [];

            function flush() {
              const kind = event || 'message';
              const text = data.join('\n');
              event = ''; data = [];
              if (!text || kind !== 'batch') return;
              try {
                const batch = JSON.parse(text);
                for (const rec of (batch.records || [])) {
                  // Skip fence commands
                  if (rec.headers?.length === 1 && rec.headers[0][0] === '' && rec.headers[0][1] === 'fence') {
                    if (rec.body?.startsWith('end-') || rec.body?.startsWith('error-')) {
                      ctrl.close();
                      reader.cancel();
                      return;
                    }
                    continue;
                  }
                  if (rec.body) {
                    try { ctrl.enqueue(JSON.parse(rec.body)); } catch {}
                  }
                }
              } catch {}
            }

            while (true) {
              const { done, value } = await reader.read();
              if (done) { ctrl.close(); return; }
              buf += dec.decode(value, { stream: true });

              let idx;
              while ((idx = buf.indexOf('\n')) !== -1) {
                const line = buf.slice(0, idx).replace(/\r$/, '');
                buf = buf.slice(idx + 1);
                if (line === '') { flush(); continue; }
                if (line.startsWith('event:')) event = line.slice(6).trim();
                else if (line.startsWith('data:')) data.push(line.slice(5).replace(/^ /, ''));
              }
            }
          } catch (e) {
            if (e.name !== 'AbortError') ctrl.error(e);
            else ctrl.close();
          }
        },
        cancel() { /* signal handles abort */ }
      });
    }

    // ── Send ─────────────────────────────────────────────────────────────────

    async function send() {
      const text = inputEl.value.trim();
      if (!text || streaming) return;
      inputEl.value = '';
      streaming = true;
      setInputEnabled(false);

      messages.push({ role: 'user', content: text });
      addMessage('user', text);

      setStatus('persisting');

      // POST to our server → persists to S2, returns { stream }
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: chatId, messages }),
      });

      if (!res.ok) {
        console.error('[send] POST failed:', res.status, await res.text().catch(() => ''));
        setStatus('idle');
        streaming = false;
        setInputEnabled(true);
        return;
      }

      const body = await res.json();
      const streamName = body.stream;
      console.log('[send] stream name:', streamName);

      setStatus('streaming');
      const bubble = addMessage('assistant', '', { streaming: true });

      // Read directly from S2 over SSE
      const ac = new AbortController();
      const s2stream = readFromS2(streamName, ac.signal);
      const reader = s2stream.getReader();
      let fullText = '';

      try {
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          console.log('[chunk]', value.type, value);
          if (value.type === 'text-delta') {
            fullText += value.text;
            bubble.textContent = fullText;
            chatEl.scrollTop = chatEl.scrollHeight;
          }
        }
      } catch (e) { console.error('[send] stream error:', e); }

      bubble.classList.remove('streaming');
      messages.push({ role: 'assistant', content: fullText });
      streaming = false;
      setInputEnabled(true);
      setStatus('idle');
      inputEl.focus();
    }

    // ── Reconnect on page load ───────────────────────────────────────────────

    async function tryReconnect() {
      try {
        const res = await fetch(`${API}/${chatId}/stream`);
        if (res.status === 204) return;  // nothing to resume
        if (!res.ok) return;

        const { stream: streamName } = await res.json();
        if (!streamName) return;

        setStatus('streaming');
        streaming = true;
        setInputEnabled(false);
        const bubble = addMessage('assistant', '', { streaming: true });

        const s2stream = readFromS2(streamName);
        const reader = s2stream.getReader();
        let fullText = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          if (value.type === 'text-delta') {
            fullText += value.text;
            bubble.textContent = fullText;
            chatEl.scrollTop = chatEl.scrollHeight;
          }
        }

        bubble.classList.remove('streaming');
        if (fullText) messages.push({ role: 'assistant', content: fullText });
        streaming = false;
        setInputEnabled(true);
        setStatus('idle');
      } catch {}
    }

    // ── Boot ─────────────────────────────────────────────────────────────────

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    tryReconnect();
  </script>
</body>
</html>
