<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resumable Chat — S2</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0a; color: #e5e5e5; height: 100vh; display: flex; flex-direction: column; }
    .header { padding: 12px 20px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 12px; }
    .header img { height: 22px; filter: invert(1); }
    .header h1 { font-size: 15px; font-weight: 500; opacity: .7; }
    .header .status { margin-left: auto; font-size: 12px; padding: 3px 10px; border-radius: 99px; }
    .status.idle { background: #1a1a2e; color: #818cf8; }
    .status.streaming { background: #14281e; color: #34d399; }
    .chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .msg { max-width: 680px; width: 100%; }
    .msg.user { align-self: flex-end; }
    .msg-label { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; opacity: .4; }
    .msg.user .msg-label { text-align: right; }
    .msg-body { padding: 10px 14px; border-radius: 10px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .msg.user .msg-body { background: #1e1b4b; color: #c7d2fe; border-bottom-right-radius: 2px; }
    .msg.assistant .msg-body { background: #1a1a1a; border: 1px solid #262626; border-bottom-left-radius: 2px; }
    .msg-body.streaming { border-color: #34d399; }
    .input-row { padding: 12px 20px; border-top: 1px solid #222; display: flex; gap: 8px; }
    input { flex: 1; padding: 10px 14px; background: #141414; border: 1px solid #333; border-radius: 8px; color: #e5e5e5; font-size: 14px; outline: none; }
    input:focus { border-color: #6366f1; }
    input:disabled { opacity: .4; }
    button { padding: 10px 20px; background: #6366f1; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
    button:hover { background: #4f46e5; }
    button:disabled { opacity: .4; cursor: default; }
    .info { text-align: center; padding: 40px 20px; opacity: .3; font-size: 13px; }
    .info kbd { background: #222; padding: 2px 6px; border-radius: 4px; font-family: inherit; }
  </style>
</head>
<body>
  <div class="header">
    <img src="https://raw.githubusercontent.com/s2-streamstore/s2-sdk-rust/main/assets/s2-white.png" alt="S2">
    <h1>Resumable Chat</h1>
    <span class="status idle" id="status">idle</span>
  </div>

  <div class="chat" id="chat">
    <div class="info">Send a message. Try <kbd>F5</kbd> mid-generation — the stream resumes from S2.</div>
  </div>

  <div class="input-row">
    <input type="text" id="input" placeholder="Say something..." autocomplete="off" autofocus>
    <button id="send">Send</button>
  </div>

  <script>
    const API = '/api/chat';
    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('input');
	    const sendBtn = document.getElementById('send');
	    const statusEl = document.getElementById('status');

	    let chatId = sessionStorage.getItem('chatId');
    if (!chatId) {
      chatId = crypto.randomUUID();
      sessionStorage.setItem('chatId', chatId);
	    }

	    const messages = [];
	    let streaming = false;
	    const streamKey = () => `chat-stream:${chatId}`;

	    function setStatus(s) {
	      statusEl.textContent = s;
	      statusEl.className = 'status ' + s;
    }

    function addMessage(role, content, opts = {}) {
      const wrap = document.createElement('div');
      wrap.className = `msg ${role}`;

      const label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = role;

      const body = document.createElement('div');
      body.className = 'msg-body' + (opts.streaming ? ' streaming' : '');
      body.textContent = content;

      wrap.appendChild(label);
      wrap.appendChild(body);
      chatEl.appendChild(wrap);
      chatEl.scrollTop = chatEl.scrollHeight;
      return body;
    }

    function setInputEnabled(on) {
      inputEl.disabled = !on;
      sendBtn.disabled = !on;
    }

	    async function readNdjson(res, bubble) {
	      const reader = res.body.getReader();
	      const dec = new TextDecoder();
	      let buf = '', fullText = '', errorText = '';

	      while (true) {
	        const { done, value } = await reader.read();
	        if (done) break;
        buf += dec.decode(value, { stream: true });

        let nl;
        while ((nl = buf.indexOf('\n')) !== -1) {
          const line = buf.slice(0, nl).trim();
          buf = buf.slice(nl + 1);
	          if (!line) continue;
	          try {
	            const chunk = JSON.parse(line);
	            if (chunk.type === 'text-delta' && chunk.delta) {
	              fullText += chunk.delta;
	              bubble.textContent = fullText;
	              chatEl.scrollTop = chatEl.scrollHeight;
	            }
	            if (chunk.type === 'error' && chunk.errorText) {
	              errorText = chunk.errorText;
	            }
	          } catch {}
	        }
	      }
	      return { fullText, errorText };
	    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text || streaming) return;
      inputEl.value = '';
      streaming = true;
      setInputEnabled(false);

      messages.push({ role: 'user', content: text });
      addMessage('user', text);
      setStatus('streaming');

      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: chatId, messages }),
      });

      if (!res.ok) {
        setStatus('idle');
        streaming = false;
        setInputEnabled(true);
        return;
      }

	      const { stream } = await res.json();
	      sessionStorage.setItem(streamKey(), stream);
	      const bubble = addMessage('assistant', '', { streaming: true });

	      const replayRes = await fetch(`${API}/stream?stream=${encodeURIComponent(stream)}`);
	      if (replayRes.ok) {
	        const { fullText, errorText } = await readNdjson(replayRes, bubble);
	        if (errorText) {
	          bubble.textContent = fullText
	            ? `${fullText}\n\n[error] ${errorText}`
	            : `[error] ${errorText}`;
	        }
	        messages.push({ role: 'assistant', content: fullText });
	        sessionStorage.removeItem(streamKey());
	      }

	      bubble.classList.remove('streaming');
	      streaming = false;
      setInputEnabled(true);
      setStatus('idle');
      inputEl.focus();
    }

	    async function tryReconnect() {
	      try {
	        const stream = sessionStorage.getItem(streamKey());
	        if (!stream) return;

	        const res = await fetch(`${API}/stream?stream=${encodeURIComponent(stream)}`);
	        if (res.status === 204 || !res.ok) {
	          sessionStorage.removeItem(streamKey());
	          return;
	        }

	        setStatus('streaming');
	        streaming = true;
	        setInputEnabled(false);
	        const bubble = addMessage('assistant', '', { streaming: true });

	        const { fullText, errorText } = await readNdjson(res, bubble);

	        bubble.classList.remove('streaming');
	        if (errorText) {
	          bubble.textContent = fullText
	            ? `${fullText}\n\n[error] ${errorText}`
	            : `[error] ${errorText}`;
	        }
	        if (fullText) messages.push({ role: 'assistant', content: fullText });
	        sessionStorage.removeItem(streamKey());
	        streaming = false;
	        setInputEnabled(true);
	        setStatus('idle');
	      } catch {}
    }

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    });

    tryReconnect();
  </script>
</body>
</html>
