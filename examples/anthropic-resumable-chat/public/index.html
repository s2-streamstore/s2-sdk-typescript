<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Anthropic Resumable Chat (S2)</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0a; color: #e5e5e5; height: 100vh; display: flex; flex-direction: column; }
    .header { padding: 12px 20px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .header h1 { font-size: 15px; font-weight: 500; opacity: .7; }
    .header .chat-link { max-width: min(44vw, 360px); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 12px; color: #a5b4fc; text-decoration: none; padding: 4px 10px; border-radius: 999px; border: 1px solid #312e81; background: #161329; }
    .header .chat-link:hover { background: #1d1840; }
    .header .copy-link { padding: 6px 12px; background: #171717; color: #d4d4d8; border: 1px solid #2a2a2a; font-size: 12px; cursor: pointer; }
    .header .copy-link:hover { background: #222; }
    .header .status { margin-left: auto; font-size: 12px; padding: 3px 10px; border-radius: 99px; }
    .status.idle { background: #1a1a2e; color: #818cf8; }
    .status.streaming { background: #14281e; color: #34d399; }
    .status.replaying { background: #2a1f0d; color: #fbbf24; }
    .chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
    .msg { max-width: 680px; width: 100%; }
    .msg.user { align-self: flex-end; }
    .msg-label { font-size: 11px; text-transform: uppercase; letter-spacing: .05em; margin-bottom: 4px; opacity: .4; }
    .msg.user .msg-label { text-align: right; }
    .msg-body { padding: 10px 14px; border-radius: 10px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
    .msg.user .msg-body { background: #1e1b4b; color: #c7d2fe; border-bottom-right-radius: 2px; }
    .msg.assistant .msg-body { background: #1a1a1a; border: 1px solid #262626; border-bottom-left-radius: 2px; }
    .msg-body.streaming { border-color: #34d399; }
    .input-row { padding: 12px 20px; border-top: 1px solid #222; display: flex; gap: 8px; }
    input { flex: 1; padding: 10px 14px; background: #141414; border: 1px solid #333; border-radius: 8px; color: #e5e5e5; font-size: 14px; outline: none; }
    input:focus { border-color: #6366f1; }
    input:disabled { opacity: .4; }
    button { padding: 10px 20px; background: #6366f1; color: #fff; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
    button:hover { background: #4f46e5; }
    button:disabled { opacity: .4; cursor: default; }
    .info { text-align: center; padding: 40px 20px; opacity: .3; font-size: 13px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Anthropic Resumable Chat · S2</h1>
    <a class="chat-link" id="chat-link" href="/" title="Share this chat URL"></a>
    <button class="copy-link" id="copy-link" type="button">Copy link</button>
    <span class="status idle" id="status">idle</span>
  </div>

  <div class="chat" id="chat">
    <div class="info">Send a message. Refresh while it answers; it resumes from S2.</div>
  </div>

  <div class="input-row">
    <input type="text" id="input" placeholder="Say something..." autocomplete="off" autofocus>
    <button id="send">Send</button>
  </div>

  <script type="module">
    import { EventSourceParserStream } from 'https://esm.sh/eventsource-parser@3/stream';

    const API = '/api/chat';
    const CHAT_ID_PATTERN = /^[a-zA-Z0-9_-]{1,64}$/;
    const EMPTY_STATE_HTML = '<div class="info">Send a message. Refresh while it answers; it resumes from S2.</div>';

    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send');
    const statusEl = document.getElementById('status');
    const chatLinkEl = document.getElementById('chat-link');
    const copyLinkEl = document.getElementById('copy-link');

    function isValidChatId(value) {
      return typeof value === 'string' && CHAT_ID_PATTERN.test(value);
    }

    function resolveChatId() {
      const url = new URL(window.location.href);
      const fromQuery = url.searchParams.get('chat');
      if (isValidChatId(fromQuery)) return fromQuery;
      const fromSession = sessionStorage.getItem('chatId');
      if (isValidChatId(fromSession)) return fromSession;
      return crypto.randomUUID();
    }

    const chatId = resolveChatId();
    sessionStorage.setItem('chatId', chatId);

    function syncChatUrl() {
      const url = new URL(window.location.href);
      url.searchParams.set('chat', chatId);
      const relativeUrl = `${url.pathname}?${url.searchParams.toString()}`;
      window.history.replaceState(null, '', relativeUrl);
      chatLinkEl.href = relativeUrl;
      chatLinkEl.textContent = `chat=${chatId}`;
      chatLinkEl.title = url.toString();
    }

    function setStatus(status) {
      statusEl.textContent = status;
      statusEl.className = `status ${status}`;
    }

    function setInputEnabled(enabled) {
      inputEl.disabled = !enabled;
      sendBtn.disabled = !enabled;
    }

    function clearEmptyState() {
      const info = chatEl.querySelector('.info');
      if (info) info.remove();
    }

    function ensureEmptyState() {
      if (chatEl.children.length === 0) chatEl.innerHTML = EMPTY_STATE_HTML;
    }

    function appendMessage(role, text) {
      clearEmptyState();
      const wrap = document.createElement('div');
      wrap.className = `msg ${role}`;
      const label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = role;
      const body = document.createElement('div');
      body.className = 'msg-body';
      body.textContent = text;
      wrap.appendChild(label);
      wrap.appendChild(body);
      chatEl.appendChild(wrap);
      chatEl.scrollTop = chatEl.scrollHeight;
      return body;
    }

    function extractText(content) {
      if (typeof content === 'string') return content;
      if (!Array.isArray(content)) return '';
      return content.filter((b) => b?.type === 'text').map((b) => b.text).join('');
    }

    async function loadHistory() {
      const res = await fetch(`${API}/history?id=${encodeURIComponent(chatId)}`);
      if (!res.ok) return [];
      const json = await res.json();
      return Array.isArray(json?.messages) ? json.messages : [];
    }

    async function* streamSse(body, signal) {
      const events = body
        .pipeThrough(new TextDecoderStream())
        .pipeThrough(new EventSourceParserStream());
      const reader = events.getReader();
      try {
        while (true) {
          if (signal?.aborted) return;
          const { done, value } = await reader.read();
          if (done) return;
          if (!value?.data) continue;
          try {
            yield { event: value.event, data: JSON.parse(value.data) };
          } catch {}
        }
      } finally {
        reader.releaseLock();
      }
    }

    // Drains the active-turn replay (if any) into a streaming bubble. Resolves once the turn ends.
    async function renderActiveTurn() {
      const controller = new AbortController();
      let bodyEl = null;
      let text = '';

      try {
        const res = await fetch(
          `${API}/stream?id=${encodeURIComponent(chatId)}`,
          { signal: controller.signal },
        );
        if (res.status === 204 || !res.body) return false;
        setStatus('replaying');

        for await (const frame of streamSse(res.body, controller.signal)) {
          const event = frame.data;
          if (event?.type === 'message_start') {
            if (!bodyEl) {
              bodyEl = appendMessage('assistant', '');
              bodyEl.classList.add('streaming');
            }
            setStatus('streaming');
          } else if (
            event?.type === 'content_block_delta' &&
            event.delta?.type === 'text_delta'
          ) {
            text += event.delta.text;
            if (!bodyEl) {
              bodyEl = appendMessage('assistant', '');
              bodyEl.classList.add('streaming');
            }
            bodyEl.textContent = text;
            chatEl.scrollTop = chatEl.scrollHeight;
          } else if (event?.type === 'error') {
            text += `\n[error: ${event.error?.message || 'unknown'}]`;
            if (!bodyEl) bodyEl = appendMessage('assistant', '');
            bodyEl.textContent = text;
          }
        }
        return true;
      } catch (err) {
        if (!controller.signal.aborted) console.error(err);
        return false;
      } finally {
        bodyEl?.classList.remove('streaming');
      }
    }

    async function renderInitial() {
      chatEl.innerHTML = '';
      const messages = await loadHistory();
      for (const m of messages) {
        appendMessage(m.role, extractText(m.content));
      }
      ensureEmptyState();
    }

    async function send() {
      const text = inputEl.value.trim();
      if (!text || sendBtn.disabled) return;
      inputEl.value = '';
      setInputEnabled(false);
      setStatus('streaming');

      // Optimistic; the server persists it to the history stream on POST.
      appendMessage('user', text);

      try {
        const res = await fetch(API, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ id: chatId, message: text }),
        });
        if (!res.ok) {
          appendMessage('assistant', `[error: ${res.status} ${res.statusText}]`);
          setStatus('idle');
          setInputEnabled(true);
          return;
        }
      } catch (err) {
        appendMessage('assistant', `[error: ${err?.message || 'request failed'}]`);
        setStatus('idle');
        setInputEnabled(true);
        return;
      }

      await renderActiveTurn();
      setStatus('idle');
      setInputEnabled(true);
      inputEl.focus();
    }

    sendBtn.addEventListener('click', send);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') send();
    });
    copyLinkEl.addEventListener('click', async () => {
      const url = new URL(window.location.href);
      url.searchParams.set('chat', chatId);
      try { await navigator.clipboard.writeText(url.toString()); } catch {}
    });

    syncChatUrl();
    (async () => {
      await renderInitial();
      // If a turn was in flight when the user last left, /stream returns 200
      // with the replay and we pick up where we left off. Otherwise 204.
      setInputEnabled(false);
      const resumed = await renderActiveTurn();
      setStatus('idle');
      setInputEnabled(true);
      if (!resumed) inputEl.focus();
    })();
  </script>
</body>
</html>
